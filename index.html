<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti 🌻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fdf5e6;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #playButton {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #FFD700;
            color: #5d3311;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            position: absolute;
            z-index: 10;
        }

        #playButton:hover {
            background-color: #edc200;
            transform: scale(1.05);
        }

        #playButton.fade-out {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        canvas {
            display: block;
            opacity: 0;
            transition: opacity 1s ease 0.3s;
        }

        canvas.show {
            opacity: 1;
        }

        .mensaje {
            position: absolute;
            bottom: 30px;
            width: 100%;
            color: #c8960c;
            font-size: 1.4rem;
            font-style: italic;
            letter-spacing: 3px;
            opacity: 0;
            text-align: center;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .mensaje.show {
            animation: fadeIn 2s forwards;
        }
    </style>
</head>
<body>
<div class="container">
    <button id="playButton">Presiona aquí 🌻</button>
    <canvas id="treeCanvas"></canvas>
    <div class="mensaje" id="finalMessage">Para alguien especial ✨</div>
</div>

<script>
    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('playButton');
    const message = document.getElementById('finalMessage');

    // Canvas tamaño
    const W = Math.min(window.innerWidth, 500);
    const H = Math.min(window.innerHeight, 650);
    canvas.width = W;
    canvas.height = H;

    // ─── Dibuja una flor girasol pequeña ───────────────────────────────────
    function drawFlower(x, y, size) {
        const petals = 8;
        // Pétalos amarillos
        ctx.fillStyle = "#F5C518";
        for (let i = 0; i < petals; i++) {
            const angle = (i / petals) * Math.PI * 2;
            const px = x + Math.cos(angle) * size * 1.3;
            const py = y + Math.sin(angle) * size * 1.3;
            ctx.beginPath();
            ctx.ellipse(px, py, size * 0.9, size * 0.45, angle, 0, Math.PI * 2);
            ctx.fill();
        }
        // Centro oscuro
        ctx.beginPath();
        ctx.arc(x, y, size * 0.65, 0, Math.PI * 2);
        ctx.fillStyle = "#3B2007";
        ctx.fill();
        // Brillo centro
        ctx.beginPath();
        ctx.arc(x - size * 0.2, y - size * 0.2, size * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fill();
    }

    // ─── Árbol recursivo fractal ───────────────────────────────────────────
    // Devuelve array de puntos finales de ramas para colocar flores
    const flowerPoints = [];

    function drawBranch(x, y, length, angle, depth, branchW) {
        if (depth === 0 || length < 3) {
            // Punto terminal → flor
            flowerPoints.push({ x, y, size: 3.5 + Math.random() * 2 });
            return;
        }

        const endX = x + Math.sin(angle) * length;
        const endY = y - Math.cos(angle) * length;

        // Rama
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = depth > 3 ? "#4B3621" : "#6B4A2A";
        ctx.lineWidth = branchW;
        ctx.lineCap = "round";
        ctx.stroke();

        // Ángulo de apertura decrece con profundidad (árbol más natural)
        const spread = (Math.PI / 5) + Math.random() * 0.15;

        // Rama izquierda
        drawBranch(endX, endY, length * 0.72, angle - spread, depth - 1, branchW * 0.68);
        // Rama derecha
        drawBranch(endX, endY, length * 0.72, angle + spread, depth - 1, branchW * 0.68);

        // Rama extra central (da más densidad)
        if (depth > 2) {
            drawBranch(endX, endY, length * 0.65, angle + (Math.random() - 0.5) * 0.3, depth - 2, branchW * 0.5);
        }
    }

    // ─── Forma de corazón: genera puntos dentro del corazón ───────────────
    // Ecuación paramétrica del corazón
    function heartPoint(t) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x, y };
    }

    function isInsideHeart(px, py) {
        // Normaliza al espacio [-16,16] x [-12,12]
        // Usa distancia mínima a la curva como proxy (simplificado)
        const cx = px, cy = py;
        // Ecuación implícita del corazón: (x²+y²-1)³ - x²y³ ≤ 0
        const nx = cx / 16, ny = cy / 13;
        const val = Math.pow(nx * nx + ny * ny - 1, 3) - nx * nx * Math.pow(ny, 3);
        return val <= 0;
    }

    // ─── Flores rellenando el corazón ─────────────────────────────────────
    function drawHeartFlowers(cx, cy, scale) {
        const count = 220;
        let placed = 0;
        let attempts = 0;
        while (placed < count && attempts < 8000) {
            attempts++;
            const rx = (Math.random() * 34) - 17;  // -17 a 17
            const ry = (Math.random() * 28) - 20;  // -20 a 8
            if (isInsideHeart(rx, ry)) {
                const sx = cx + rx * scale;
                const sy = cy + ry * scale;
                const size = 3.5 + Math.random() * 3;
                drawFlower(sx, sy, size);
                placed++;
            }
        }
    }

    // ─── Dibujo principal ─────────────────────────────────────────────────
    function drawScene() {
        ctx.clearRect(0, 0, W, H);

        const baseX = W / 2;
        const baseY = H - 60;

        // Tronco y árbol
        flowerPoints.length = 0;
        drawBranch(baseX, baseY, H * 0.22, 0, 8, 9);

        // Flores en puntas de ramas
        flowerPoints.forEach(p => drawFlower(p.x, p.y, p.size));

        // ── Corazón de flores encima del árbol ──
        // Centro del corazón
        const heartCX = baseX;
        const heartCY = baseY - H * 0.52;
        const heartScale = H * 0.022;

        drawHeartFlowers(heartCX, heartCY, heartScale);

        // Contorno suave del corazón (línea de flores)
        for (let t = 0; t < Math.PI * 2; t += 0.05) {
            const hp = heartPoint(t);
            const sx = heartCX + hp.x * heartScale;
            const sy = heartCY + hp.y * heartScale;
            if (Math.random() > 0.3) {
                drawFlower(sx, sy, 4 + Math.random() * 2);
            }
        }
    }

    // ─── Animación de flores apareciendo una a una ─────────────────────────
    let animationStarted = false;

    // Fase 1: árbol crece (tronco)
    // Fase 2: flores del árbol aparecen
    // Fase 3: corazón se llena
    // Fase 4: mensaje

    function animate() {
        // Pre-calcula la escena completa en off-screen canvas
        const offCanvas = document.createElement('canvas');
        offCanvas.width = W;
        offCanvas.height = H;
        const offCtx = offCanvas.getContext('2d');

        // Dibuja árbol en off-screen
        const baseX = W / 2;
        const baseY = H - 60;
        const localFlowers = [];

        function branch(x, y, length, angle, depth, bw) {
            if (depth === 0 || length < 3) {
                localFlowers.push({ x, y, size: 3.5 + Math.random() * 2, type: 'branch' });
                return;
            }
            const ex = x + Math.sin(angle) * length;
            const ey = y - Math.cos(angle) * length;
            offCtx.beginPath();
            offCtx.moveTo(x, y);
            offCtx.lineTo(ex, ey);
            offCtx.strokeStyle = depth > 3 ? "#4B3621" : "#6B4A2A";
            offCtx.lineWidth = bw;
            offCtx.lineCap = "round";
            offCtx.stroke();
            const spread = Math.PI / 5 + Math.random() * 0.15;
            branch(ex, ey, length * 0.72, angle - spread, depth - 1, bw * 0.68);
            branch(ex, ey, length * 0.72, angle + spread, depth - 1, bw * 0.68);
            if (depth > 2) branch(ex, ey, length * 0.65, angle + (Math.random() - 0.5) * 0.3, depth - 2, bw * 0.5);
        }
        branch(baseX, baseY, H * 0.22, 0, 8, 9);

        // Flores del corazón
        const heartCX = baseX;
        const heartCY = baseY - H * 0.52;
        const heartScale = H * 0.022;
        let placed = 0, attempts = 0;
        while (placed < 220 && attempts < 8000) {
            attempts++;
            const rx = Math.random() * 34 - 17;
            const ry = Math.random() * 28 - 20;
            if (isInsideHeart(rx, ry)) {
                localFlowers.push({ x: heartCX + rx * heartScale, y: heartCY + ry * heartScale, size: 3.5 + Math.random() * 3, type: 'heart' });
                placed++;
            }
        }
        for (let t = 0; t < Math.PI * 2; t += 0.05) {
            const hp = heartPoint(t);
            if (Math.random() > 0.3) {
                localFlowers.push({ x: heartCX + hp.x * heartScale, y: heartCY + hp.y * heartScale, size: 4 + Math.random() * 2, type: 'heart' });
            }
        }

        // Copia el árbol (ramas) al canvas principal
        ctx.drawImage(offCanvas, 0, 0);

        // Anima flores apareciendo en orden
        let i = 0;
        function showNextFlower() {
            if (i >= localFlowers.length) {
                setTimeout(() => message.classList.add('show'), 400);
                return;
            }
            // Muestra varias flores por frame para ser más rápido
            const batch = i < 50 ? 2 : 5;
            for (let b = 0; b < batch && i < localFlowers.length; b++, i++) {
                const f = localFlowers[i];
                drawFlower(f.x, f.y, f.size);
            }
            requestAnimationFrame(showNextFlower);
        }
        showNextFlower();
    }

    btn.addEventListener('click', () => {
        if (!animationStarted) {
            animationStarted = true;
            btn.classList.add('fade-out');
            canvas.classList.add('show');
            setTimeout(animate, 600);
        }
    });
</script>
</body>
</html>
