<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti 🌻</title>
    <style>
        /* --- Estilos Globales y Fondo --- */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fdf5e6; /* Fondo crema suave */
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .container {
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- Estilos del Botón --- */
        #playButton {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #FFD700; /* Amarillo Girasol */
            color: #5d3311; /* Marrón tronco */
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 10; /* Asegura que esté arriba */
            position: absolute;
        }

        #playButton:hover {
            background-color: #edc200;
            transform: scale(1.05);
        }

        #playButton.fade-out {
            opacity: 0;
            pointer-events: none; /* Desactiva clics tras desaparecer */
        }

        /* --- Estilos del Árbol y Flores --- */
        canvas {
            display: block;
            opacity: 0; /* Oculto inicialmente */
            transition: opacity 1s ease 0.5s; /* Aparece suavemente tras el botón */
        }

        canvas.show {
            opacity: 1;
        }

        /* --- Estilos del Mensaje --- */
        .mensaje {
            position: absolute;
            bottom: 50px;
            width: 100%;
            color: #d4a017;
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0;
        }

        /* Animación para el mensaje al final */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .mensaje.show {
            animation: fadeIn 3s forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="playButton">Presiona aquí 🌻</button>

        <canvas id="treeCanvas"></canvas>

        <div class="mensaje" id="finalMessage">Para alguien especial ✨</div>
    </div>

    <script>
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('playButton');
        const message = document.getElementById('finalMessage');

        // Configuración del canvas
        canvas.width = 600;
        canvas.height = 500;

        // --- Funciones de Dibujo (Canvas) ---

        function drawFlower(x, y) {
            const petals = 6;
            ctx.fillStyle = "#FFD700"; // Amarillo brillante
            for (let i = 0; i < petals; i++) {
                ctx.beginPath();
                ctx.ellipse(x, y, 5, 2, (i * Math.PI) / 3, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fillStyle = "#5D4037"; // Centro café
            ctx.fill();
        }

        function drawTree(startX, startY, len, angle, branchWidth) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = "#4B3621"; // Marrón oscuro tronco
            ctx.lineWidth = branchWidth;
            ctx.translate(startX, startY);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            // Si la rama es muy corta, dibujar una flor
            if (len < 10) {
                if (Math.random() > 0.2) {
                    drawFlower(0, -len);
                }
                ctx.restore();
                return;
            }

            // Ramificaciones recursivas
            drawTree(0, -len, len * 0.75, angle - 20, branchWidth * 0.7);
            drawTree(0, -len, len * 0.75, angle + 20, branchWidth * 0.7);

            ctx.restore();
        }

        // --- Lógica de Animación ---

        let currentLen = 0;
        let animationStarted = false;

        function animateTree() {
            if (currentLen < 80) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // Dibuja el tronco creciendo
                drawTree(canvas.width / 2, canvas.height - 80, currentLen, 0, 10);
                currentLen += 1;
                requestAnimationFrame(animateTree);
            } else {
                // Una vez que el tronco alcanza su tamaño, dibuja el árbol completo (recursivo instantáneo) con flores
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawTree(canvas.width / 2, canvas.height - 80, 80, 0, 10);
                
                // Muestra el mensaje final
                message.classList.add('show');
            }
        }

        // --- Evento de Clic en el Botón ---

        btn.addEventListener('click', () => {
            if (!animationStarted) {
                animationStarted = true;
                
                // 1. Desaparecer botón
                btn.classList.add('fade-out');
                
                // 2. Mostrar canvas
                canvas.classList.add('show');
                
                // 3. Iniciar animación del árbol tras un pequeño delay
                setTimeout(animateTree, 500);
            }
        });
    </script>
</body>
</html>
